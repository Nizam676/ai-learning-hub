<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Platform Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.password-container{
    position:relative;
}

.password-container input{
    width:100%;
}

.eye-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    font-size:16px;
}

.login-btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    background:#2f8cf0;
}

.divider{
    text-align:center;
    margin:20px 0;
    color:gray;
}

.social button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
    color:white;
    font-size:14px;
    cursor:pointer;
}

.google{
    background:#db4437;
}

.linkedin{
    background:#0077b5;
}

.facebook{
    background:#3b5998;
}

</style>

</head>

<body>

<div class="login-container">

<h2>AI Platform Login</h2>

<form onsubmit="return false;"> <!-- prevent default form submit -->

<input type="email" placeholder="Email" required>

<div class="password-container">
<input type="password" id="password" placeholder="Password" required>
<button type="button" class="eye-btn" onclick="togglePassword()">👁</button>
</div>

<button type="button" class="login-btn" onclick="login()">Login</button>

</form>

<div class="divider">OR</div>

<div class="social">

<button class="google">Login with Google</button>

<button class="linkedin">Login with LinkedIn</button>

<button class="facebook">Login with Facebook</button>

</div>

</div>

<script>

function togglePassword() {
    let password = document.getElementById("password");
    if(password.type === "password"){
        password.type = "text";
    }else{
        password.type = "password";
    }
}

function login(){
    // Redirect to home page
    window.location.href = "home.html";
}

</script>

</body>
</html>
